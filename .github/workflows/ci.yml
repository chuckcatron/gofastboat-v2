name: CI

on:
  push:
    branches: [master]
  pull_request:

# Dummy public env so the production build can prerender Convex/Clerk providers
# without real credentials (mirrors the local .env.local placeholders).
env:
  NEXT_PUBLIC_CONVEX_URL: "https://placeholder.convex.cloud"
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"

# NOTE: uses `npm install` (not `npm ci`) and no npm cache because there is no
# committed package-lock.json yet — the local dev environment's npm mirror is
# inconsistent and can't produce a clean lockfile. Once a lockfile is generated
# against the real registry (first Vercel/CI install), commit it and switch the
# jobs to `npm ci` + `cache: npm` for reproducibility and speed.

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run type-check
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
